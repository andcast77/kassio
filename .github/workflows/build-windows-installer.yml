name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-nsis:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage bundled backend
        run: node scripts/stage-backend.mjs --target=windows

      - name: Build NSIS installer and updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm --dir apps/desktop tauri build -b nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kassio-windows-nsis
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/*.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.zip.sig
            apps/desktop/src-tauri/target/release/bundle/latest.json
          if-no-files-found: error

      - name: Upload to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/desktop/src-tauri/target/release/bundle/nsis/*.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.zip.sig
            apps/desktop/src-tauri/target/release/bundle/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
